# SyncMusic — Production Compose
# Pulls pre-built images from GHCR. For local development use docker-compose.dev.yml.
#
# Usage:
#   docker compose pull && docker compose up -d
#
# First run: update the image tags to the desired release version.

services:
  syncmusic-backend:
    image: ghcr.io/rafalpolawski/syncmusic-backend:latest
    container_name: syncmusic-backend
    restart: unless-stopped
    expose:
      - "8080" # HTTP API — internal only (Caddy proxies)
    ports:
      - "4433:4433/udp" # WebTransport — must reach clients directly
    volumes:
      - "${MUSIC_DIR:-/music}:/app/music:ro"
      - syncmusic_db:/app/data
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8080/api/ok" ]
      interval: 30s
      timeout: 5s
      retries: 3
    environment:
      - REDIS_URL=redis://syncmusic-redis:6379/0
    depends_on:
      - syncmusic-redis

  syncmusic-redis:
    image: redis:8-alpine
    container_name: syncmusic-redis
    restart: unless-stopped
    volumes:
      - syncmusic_redis_data:/data

  syncmusic-frontend:
    image: ghcr.io/rafalpolawski/syncmusic-frontend:latest
    container_name: syncmusic-frontend
    restart: unless-stopped
    expose:
      - "3000" # nginx static — internal only (Caddy proxies)
    depends_on:
      - syncmusic-backend

  syncmusic-proxy:
    image: ghcr.io/rafalpolawski/syncmusic-proxy:latest
    container_name: syncmusic-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - syncmusic-backend
      - syncmusic-frontend

  syncmusic-postgres:
    image: postgres:18-alpine
    container_name: syncmusic-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: password
      POSTGRES_DB: keycloak
    volumes:
      - syncmusic_postgres_data:/var/lib/postgresql/data

  syncmusic-keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: syncmusic-keycloak
    restart: unless-stopped
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://syncmusic-postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: password
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    command: start
    ports:
      - "8082:8080"
    depends_on:
      - syncmusic-postgres

volumes:
  caddy_data:
  caddy_config:
  syncmusic_db:
  syncmusic_redis_data:
  syncmusic_postgres_data:
