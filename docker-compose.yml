# SyncMusic — Production Base
# Use this file for deployments. Regular users run:
#   docker compose up -d

services:
  syncmusic-backend:
    image: ghcr.io/rafalpolawski/syncmusic-backend:latest
    container_name: syncmusic-backend
    restart: unless-stopped
    expose:
      - "8080"
    ports:
      - "4433:4433/udp" # WebTransport - Client must reach directly
    environment:
      - REDIS_URL=redis://syncmusic-redis:6379/0
      - DATABASE_URL=postgres://keycloak:password@syncmusic-postgres:5432/keycloak?sslmode=disable
    volumes:
      - "${MUSIC_DIR:-./music}:/app/music:ro"
    depends_on:
      - syncmusic-redis
      - syncmusic-postgres

  syncmusic-frontend:
    image: ghcr.io/rafalpolawski/syncmusic-frontend:latest
    container_name: syncmusic-frontend
    restart: "no" # In production, this only builds once if used

  syncmusic-proxy:
    image: caddy:2.11-alpine
    container_name: syncmusic-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - frontend_dist:/usr/share/caddy:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - syncmusic-backend

  syncmusic-redis:
    image: redis:8-alpine
    container_name: syncmusic-redis
    restart: unless-stopped
    volumes:
      - syncmusic_redis:/data

  syncmusic-postgres:
    image: postgres:18-alpine
    container_name: syncmusic-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: password
      POSTGRES_DB: keycloak
    volumes:
      - syncmusic_postgres_data:/var/lib/postgresql/data

  syncmusic-keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: syncmusic-keycloak
    restart: unless-stopped
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://syncmusic-postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: password
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME: "127.0.0.1"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY: edge
    command: start-dev
    depends_on:
      - syncmusic-postgres
      - syncmusic-redis

volumes:
  caddy_data:
  caddy_config:
  frontend_dist:
  syncmusic_redis:
  syncmusic_postgres_data:
