version: '3.8'

services:
  sync-app:
    build: 
      context: ./backend
    ports:
      - "12137:12137" # Mapujemy port 12137 z Twojego PC na port 12137 w kontenerze
    volumes:
      - ./frontend:/app/frontend # Montujemy frontend na żywo, żeby nie musieć przebudowywać kontenera przy zmianach w HTML!