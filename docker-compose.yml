# SyncMusic — Docker Compose

services:
  sync-app:
    build:
      context: ./backend
    ports:
      - "12137:12137" # HTTP/1.1 API
      - "4433:4433/udp" # HTTP/3 WebTransport
    volumes:
      - "/c/Muzyka:/app/music" # Mount the host music library into the container

  caddy:
    build:
      context: ./caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - sync-app
      - sync-frontend

  sync-frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules # Anonymous volume — prevents the Windows bind mount from overwriting the container's node_modules
    depends_on:
      - sync-app

volumes:
  caddy_data:
  caddy_config:
