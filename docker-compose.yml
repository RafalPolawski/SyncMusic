# SyncMusic — Production Base
# Use this file for deployments. Regular users run:
#   docker compose up -d

services:
  syncmusic-backend:
    image: ghcr.io/rafalpolawski/syncmusic-backend:latest
    container_name: syncmusic-backend
    restart: unless-stopped
    expose:
      - "8080"
    ports:
      - "4433:4433/udp" # WebTransport - Client must reach directly
    environment:
      - REDIS_URL=redis://syncmusic-redis:6379/0
      - POSTGRES_HOST=syncmusic-postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=syncmusic
      - JWT_SECRET=syncmusic_dev_secret_change_me
    volumes:
      - "${MUSIC_DIR:-./music}:/app/music:ro"
    depends_on:
      syncmusic-redis:
        condition: service_healthy
      syncmusic-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/api/ok || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15

  syncmusic-frontend:
    image: ghcr.io/rafalpolawski/syncmusic-frontend:latest
    container_name: syncmusic-frontend
    restart: "no"

  syncmusic-proxy:
    image: caddy:2.11-alpine
    container_name: syncmusic-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - frontend_dist:/usr/share/caddy:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      syncmusic-backend:
        condition: service_healthy

  syncmusic-redis:
    image: redis:8-alpine
    container_name: syncmusic-redis
    restart: unless-stopped
    volumes:
      - syncmusic_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  syncmusic-postgres:
    image: postgres:18-alpine
    container_name: syncmusic-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=postgres
    volumes:
      - syncmusic_postgres_data:/var/lib/postgresql/data
      - ./caddy/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 20

  syncmusic-keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: syncmusic-keycloak
    restart: unless-stopped
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://syncmusic-postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD:-admin}
      KC_HOSTNAME: "127.0.0.1"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY: edge
      KC_HEALTH_ENABLED: "true"
    command: start-dev
    depends_on:
      syncmusic-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  syncmusic-prometheus:
    image: prom/prometheus:latest
    container_name: syncmusic-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    depends_on:
      syncmusic-backend:
        condition: service_healthy

  syncmusic-grafana:
    image: grafana/grafana:latest
    container_name: syncmusic-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - syncmusic-prometheus

volumes:
  caddy_data:
  caddy_config:
  frontend_dist:
  backend_data:
  syncmusic_redis:
  syncmusic_postgres_data:
  prometheus_data:
  grafana_data:
