# SyncMusic — Docker Compose

services:
  syncmusic-backend:
    container_name: syncmusic-backend
    build:
      context: ./backend
    ports:
      - "12137:12137" # HTTP/1.1 API
      - "4433:4433/udp" # HTTP/3 WebTransport
    volumes:
      - "/c/Muzyka:/app/music" # Mount the host music library into the container

  syncmusic-proxy:
    container_name: syncmusic-proxy
    build:
      context: ./caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - syncmusic-backend
      - syncmusic-frontend

  syncmusic-frontend:
    container_name: syncmusic-frontend
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules # Anonymous volume — prevents the Windows bind mount from overwriting the container's node_modules
    depends_on:
      - syncmusic-backend

volumes:
  caddy_data:
  caddy_config:
