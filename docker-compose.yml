# SyncMusic — Production Compose
# Pulls pre-built images from GHCR. For local development use docker-compose.dev.yml.
#
# Usage:
#   docker compose pull && docker compose up -d

services:
  syncmusic-backend:
    image: ghcr.io/rafalpolawski/syncmusic-backend:latest
    container_name: syncmusic-backend
    restart: unless-stopped
    expose:
      - "8080" # HTTP API — internal only (Caddy proxies)
    ports:
      - "4433:4433/udp" # WebTransport — must reach clients directly
    volumes:
      - "${MUSIC_DIR:-/music}:/app/music:ro"
      - syncmusic_redis:/data
    environment:
      - REDIS_URL=redis://syncmusic-redis:6379/0
      - DATABASE_URL=postgres://keycloak:password@syncmusic-postgres:5432/keycloak?sslmode=disable
    depends_on:
      - syncmusic-redis
      - syncmusic-postgres

  syncmusic-frontend:
    build:
      context: ./frontend
    container_name: syncmusic-frontend
    volumes:
      - frontend_dist:/usr/share/caddy
    restart: "no" # Runs build once then exits

  syncmusic-proxy:
    image: caddy:2.9-alpine
    container_name: syncmusic-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - FRONTEND_DEV=""
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - frontend_dist:/usr/share/caddy:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - syncmusic-backend
      - syncmusic-frontend

  syncmusic-redis:
    image: redis:8-alpine
    container_name: syncmusic-redis
    restart: unless-stopped
    volumes:
      - syncmusic_redis:/data

  syncmusic-postgres:
    image: postgres:18-alpine
    container_name: syncmusic-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: password
      POSTGRES_DB: keycloak
    volumes:
      - syncmusic_postgres_data:/var/lib/postgresql/data

  syncmusic-keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: syncmusic-keycloak
    restart: unless-stopped
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://syncmusic-postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: password
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_RELATIVE_PATH: /auth
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: xforwarded
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY: edge
    command: start
    depends_on:
      - syncmusic-postgres
      - syncmusic-redis

volumes:
  caddy_data:
  caddy_config:
  frontend_dist:
  syncmusic_redis:
  syncmusic_postgres_data:
