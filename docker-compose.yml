# SyncMusic — Production Compose
# Pulls pre-built images from GHCR. For local development use docker-compose.dev.yml.
#
# Usage:
#   docker compose pull && docker compose up -d
#
# First run: update the image tags to the desired release version.

services:
  syncmusic-backend:
    image: ghcr.io/rafalpolawski/syncmusic-backend:latest
    container_name: syncmusic-backend
    restart: unless-stopped
    expose:
      - "8080"    # HTTP API — internal only (Caddy proxies)
    ports:
      - "4433:4433/udp"  # WebTransport — must reach clients directly
    volumes:
      - "${MUSIC_DIR:-/music}:/app/music:ro"
      - syncmusic_db:/app/syncmusic.db
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/ok"]
      interval: 30s
      timeout: 5s
      retries: 3

  syncmusic-frontend:
    image: ghcr.io/rafalpolawski/syncmusic-frontend:latest
    container_name: syncmusic-frontend
    restart: unless-stopped
    expose:
      - "3000"    # nginx static — internal only (Caddy proxies)
    depends_on:
      - syncmusic-backend

  syncmusic-proxy:
    image: ghcr.io/rafalpolawski/syncmusic-proxy:latest
    container_name: syncmusic-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - syncmusic-backend
      - syncmusic-frontend

volumes:
  caddy_data:
  caddy_config:
  syncmusic_db:
