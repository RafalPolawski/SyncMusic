name: Build Dev Images

# Triggered on every push to main.
# Builds all three images and pushes them to GHCR with the :dev tag.
# Used to quickly verify that images still build; can be pulled for testing.

on:
  push:
    branches: [main]
  workflow_dispatch:  # allows triggering manually from the GitHub UI

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/syncmusic-backend:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/syncmusic-frontend:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push proxy
        uses: docker/build-push-action@v6
        with:
          context: ./caddy
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/syncmusic-proxy:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max
