name: Release

# Triggered only when a Release is manually published on GitHub.
# Builds all three images and pushes them to GHCR with:
#   :latest
#   :<version>  (e.g. v1.2.0)

on:
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version tag
        id: version
        run: echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/syncmusic-backend:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/syncmusic-backend:${{ steps.version.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/syncmusic-frontend:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/syncmusic-frontend:${{ steps.version.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push proxy
        uses: docker/build-push-action@v6
        with:
          context: ./caddy
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/syncmusic-proxy:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/syncmusic-proxy:${{ steps.version.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
