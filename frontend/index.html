<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyncMusic</title>
    <style>
        /* GŁÓWNY MOTYW (Dark Mode w stylu Spotify) */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin: 0; padding: 20px; background: #121212; color: white; }
        h1 { margin-bottom: 5px; color: #1DB954; }
        p { margin-top: 0; font-size: 14px; color: #aaa; }
        
        /* ODTWARZACZ I KONTROLKI */
        .player-container { background: #181818; padding: 20px; border-radius: 12px; max-width: 400px; margin: 0 auto 20px auto; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        #currentSongDisplay { font-size: 18px; font-weight: bold; margin-bottom: 15px; color: #fff; word-wrap: break-word; min-height: 25px; }
        audio { width: 100%; outline: none; margin-bottom: 15px; }
        
        .controls { display: flex; justify-content: center; align-items: center; gap: 15px; }
        .ctrl-btn { background: #282828; color: white; border: none; border-radius: 50%; width: 50px; height: 50px; font-size: 20px; cursor: pointer; transition: 0.2s; display: flex; justify-content: center; align-items: center;}
        .ctrl-btn:hover { background: #3E3E3E; transform: scale(1.05); }
        .ctrl-btn:active { transform: scale(0.95); }
        #shuffleBtn.active { color: #1DB954; background: #222; } /* Zielony jak jest włączone losowanie */

        /* BIBLIOTEKA I PRZYCISKI */
        button { font-size: 16px; cursor: pointer; border-radius: 8px; border: none; font-family: inherit; }
        .song-btn { background-color: #282828; color: #ddd; width: 100%; max-width: 400px; text-align: left; margin: 8px auto; display: block; font-size: 14px; padding: 14px; transition: 0.2s; }
        .song-btn:hover { background-color: #3E3E3E; }
        .folder-btn { background-color: #1a5276; font-weight: bold; border-left: 5px solid #2980b9; }
        .folder-btn:hover { background-color: #2471a3; }
        
        #backBtn { background-color: #ff9800; color: white; display: none; margin: 0 auto 15px auto; width: 100%; max-width: 400px; padding: 12px; font-weight: bold; }
        #backBtn:hover { background-color: #e68a00; }

        /* NAKŁADKA POWITALNA */
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95); z-index: 1000; flex-direction: column; justify-content: center; align-items: center; }
        #joinBtn { background-color: #1DB954; color: white; font-size: 20px; padding: 20px 40px; border-radius: 50px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        #joinBtn:hover { transform: scale(1.05); background-color: #1ed760; }
    </style>
</head>
<body>

    <div id="overlay">
        <h2>Muzyka już gra!</h2>
        <button id="joinBtn">DOŁĄCZ DO ODSŁUCHU 🎧</button>
    </div>

    <h1>SyncMusic 🚀</h1>
    <p>Status: <span id="status" style="color: yellow;">Łączenie...</span></p>

    <div class="player-container">
        <div id="currentSongDisplay">Wybierz utwór z biblioteki...</div>
        
        <audio id="audioPlayer" controls></audio>
        
        <div class="controls">
            <button id="shuffleBtn" class="ctrl-btn" title="Losowanie (Shuffle)">🔀</button>
            <button id="prevBtn" class="ctrl-btn" title="Poprzedni utwór">⏮️</button>
            <button id="nextBtn" class="ctrl-btn" title="Następny utwór">⏭️</button>
        </div>
    </div>
    
    <div id="playlist">
        <button id="backBtn">⬅ Wróć do folderów</button>
        <div id="foldersContainer"></div>
        <div id="songsContainer" style="display: none;"></div>
    </div>

    <script>
        const audio = document.getElementById("audioPlayer");
        const statusText = document.getElementById("status");
        const currentSongDisplay = document.getElementById("currentSongDisplay");
        
        const foldersContainer = document.getElementById("foldersContainer");
        const songsContainer = document.getElementById("songsContainer");
        const backBtn = document.getElementById("backBtn");
        const overlay = document.getElementById("overlay");
        
        const socket = new WebSocket("ws://" + window.location.host + "/ws");
        
        let ignoreEvents = false; 
        let pendingPlay = false; 
        let syncReceivedTime = 0; 
        let syncAudioTime = 0;    
        let shouldBePlaying = false; 
        
        let currentPlaylist = [];
        let currentSongPath = "";
        let isShuffle = false; // Flaga losowania
        let lastKnownTime = -1; 

        socket.onopen = () => {
            statusText.innerText = "Podłączono! 🟢";
            statusText.style.color = "lime";
        };

        const sendSync = (data) => {
            if (!ignoreEvents) socket.send(JSON.stringify(data));
        };

        // Aktualizacja nazwy aktualnie grającego utworu
        const updateNowPlaying = (path) => {
            if (!path) return;
            const parts = path.split('/');
            currentSongDisplay.innerText = "🎵 " + parts[parts.length - 1]; // Pokazuje tylko nazwę pliku
        };

        // --- LIVENESS PROBE (Z poprzedniego kroku, ratuje przed deadlockiem) ---
        setInterval(() => {
            if (!shouldBePlaying) return;
            const isActuallyMoving = audio.currentTime > lastKnownTime;
            lastKnownTime = audio.currentTime;
            if (audio.paused || !isActuallyMoving) {
                audio.play().catch(() => {
                    if (!pendingPlay) { pendingPlay = true; overlay.style.display = "flex"; }
                });
            }
        }, 800);

        // --- LOGIKA NASTĘPNY / POPRZEDNI / LOSOWANIE ---
        document.getElementById("shuffleBtn").onclick = () => {
            isShuffle = !isShuffle;
            document.getElementById("shuffleBtn").classList.toggle("active", isShuffle);
        };

        const playNext = () => {
            if (currentPlaylist.length === 0) return;
            let nextIndex = 0;
            
            if (isShuffle) {
                // Losujemy dowolny utwór
                nextIndex = Math.floor(Math.random() * currentPlaylist.length);
            } else {
                // Szukamy obecnego i bierzemy następny
                const currentIndex = currentPlaylist.findIndex(s => s.path === currentSongPath);
                nextIndex = currentIndex + 1;
                if (nextIndex >= currentPlaylist.length) nextIndex = 0; // Wracamy na początek listy
            }
            socket.send(JSON.stringify({ action: "load", song: currentPlaylist[nextIndex].path }));
        };

        const playPrev = () => {
            if (currentPlaylist.length === 0) return;
            // Poprzedni utwór zazwyczaj omija shuffle, po prostu cofa o 1 (lub wraca na koniec)
            const currentIndex = currentPlaylist.findIndex(s => s.path === currentSongPath);
            let prevIndex = currentIndex - 1;
            if (prevIndex < 0) prevIndex = currentPlaylist.length - 1;
            socket.send(JSON.stringify({ action: "load", song: currentPlaylist[prevIndex].path }));
        };

        document.getElementById("nextBtn").onclick = playNext;
        document.getElementById("prevBtn").onclick = playPrev;

        // Kiedy utwór naturalnie dobiegnie końca
        audio.onended = () => {
            if (!ignoreEvents) playNext();
        };

        // --- ZDARZENIA ODTWARZACZA ---
        audio.onplay = () => {
            if (ignoreEvents) return;
            shouldBePlaying = true;
            sendSync({ action: "play", time: audio.currentTime });
        };

        audio.onpause = () => {
            if (ignoreEvents || audio.readyState < 2) return; 
            shouldBePlaying = false;
            sendSync({ action: "pause", time: audio.currentTime });
        };

        audio.onseeked = () => {
            if (ignoreEvents) return;
            lastKnownTime = -1; 
            sendSync({ action: "seek", time: audio.currentTime, isPlaying: true });
        };

        document.getElementById("joinBtn").onclick = () => {
            overlay.style.display = "none"; 
            pendingPlay = false;
            const waitTimeSeconds = (Date.now() - syncReceivedTime) / 1000;
            audio.currentTime = syncAudioTime + waitTimeSeconds;
            shouldBePlaying = true;
            audio.play();
        };

        // --- POBIERANIE PIOSENEK ---
        fetch('/api/songs').then(r => r.json()).then(songs => {
            if(!songs || songs.length === 0) return;
            const groups = {};
            songs.forEach(path => {
                const parts = path.split('/');
                const folder = parts.length > 1 ? parts[0] : "Luzem";
                if (!groups[folder]) groups[folder] = [];
                groups[folder].push({ path, name: parts.length > 1 ? parts.slice(1).join('/') : path });
            });

            const showFolders = () => {
                foldersContainer.style.display = "block"; songsContainer.style.display = "none";
                backBtn.style.display = "none"; foldersContainer.innerHTML = "";
                for (const f in groups) {
                    const b = document.createElement("button");
                    b.className = "song-btn folder-btn";
                    b.innerText = `📁 ${f} (${groups[f].length})`;
                    b.onclick = () => {
                        foldersContainer.style.display = "none"; songsContainer.style.display = "block";
                        backBtn.style.display = "inline-block"; songsContainer.innerHTML = "";
                        
                        // Zapisujemy folder jako aktywną playlistę
                        currentPlaylist = groups[f];
                        
                        groups[f].forEach(s => {
                            const sb = document.createElement("button");
                            sb.className = "song-btn"; sb.innerText = "🎵 " + s.name;
                            sb.onclick = () => socket.send(JSON.stringify({ action: "load", song: s.path }));
                            songsContainer.appendChild(sb);
                        });
                    };
                    foldersContainer.appendChild(b);
                }
            };
            showFolders();
            backBtn.onclick = showFolders;
        });

        // --- ODBIERANIE ROZKAZÓW Z SERWERA ---
        socket.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            ignoreEvents = true;

            if (msg.action === "sync") {
                audio.src = "/music/" + msg.song;
                currentSongPath = msg.song;
                updateNowPlaying(currentSongPath);
                
                audio.currentTime = msg.time;
                syncReceivedTime = Date.now();
                syncAudioTime = msg.time;
                shouldBePlaying = msg.isPlaying;
            } else if (msg.action === "load") {
                audio.src = "/music/" + msg.song;
                currentSongPath = msg.song;
                updateNowPlaying(currentSongPath);
                
                shouldBePlaying = true;
            } else if (msg.action === "play") {
                audio.currentTime = msg.time;
                shouldBePlaying = true;
            } else if (msg.action === "pause") {
                shouldBePlaying = false;
                audio.pause();
                audio.currentTime = msg.time;
            } else if (msg.action === "seek") {
                audio.currentTime = msg.time;
                shouldBePlaying = msg.isPlaying;
                lastKnownTime = -1; 
            }

            setTimeout(() => { ignoreEvents = false; }, 800);
        };
    </script>
</body>
</html>
