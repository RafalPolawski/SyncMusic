<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- PWA Setup -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1DB954">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <link rel="icon" type="image/png" href="/icon-192.png">

    <title>SyncMusic</title>
    <!-- Modern Inter Font for a Premium Feel -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/styles/main.css">
</head>

<body>

    <!-- Bottom Navigation Bar (Added for Symfonium UX) -->
    <nav id="bottomNav" class="bottom-nav">
        <button id="navLibrary" class="nav-btn active-nav">
            <svg viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H8V4h12v12z"/></svg>
            <span>Library</span>
        </button>
        <button id="navQueue" class="nav-btn">
            <svg viewBox="0 0 24 24"><path d="M15 6H3v2h12V6zm0 4H3v2h12v-2zM3 16h8v-2H3v2zM17 6v8.18c-.31-.11-.65-.18-1-.18-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3V8h3V6h-5z"/></svg>
            <span>Queue <span id="queueCountBadge" class="nav-badge" style="display:none;">0</span></span>
        </button>
        <button id="openSettingsBtn" class="nav-btn">
            <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.06-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.73 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.06.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.49-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
            <span>Settings</span>
        </button>
    </nav>

    <div id="overlay">
        <h2 class="overlay-title">SyncMusic</h2>
        <div style="margin-bottom: 25px; color: rgba(255,255,255,0.6); font-size: 14px;">Choose your playback mode</div>
        
        <div style="background: rgba(0,0,0,0.3); padding: 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px;">
            <input type="text" id="nicknameInput" class="nickname-input" placeholder="Your nickname" maxlength="20" autocomplete="off">
            <input type="text" id="roomIdInput" class="nickname-input" placeholder="Room ID (optional)" maxlength="20" autocomplete="off" style="margin-top: 10px;">
            
            <div id="activeRoomsContainer" style="display:none; margin-top: 15px; text-align: left;">
                <div style="font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;">Active Rooms</div>
                <div id="activeRoomsList" style="display: flex; gap: 8px; flex-wrap: wrap;"></div>
            </div>

            <button id="joinBtn" style="margin-top: 20px;">JOIN ONLINE ROOM 🎧</button>
        </div>

        <div style="display: flex; align-items: center; margin: 15px 0; color: rgba(255,255,255,0.4); font-size: 12px;">
            <div style="flex: 1; height: 1px; background: rgba(255,255,255,0.1);"></div>
            <span style="padding: 0 10px;">OR</span>
            <div style="flex: 1; height: 1px; background: rgba(255,255,255,0.1);"></div>
        </div>

        <button id="offlineModeBtn" style="background: rgba(255, 255, 255, 0.08); color: #fff; width: 100%; padding: 16px; border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; backdrop-filter: blur(5px); transition: all 0.2s ease;" onmouseover="this.style.background='rgba(255,255,255,0.15)'" onmouseout="this.style.background='rgba(255,255,255,0.08)'">START LOCAL OFFLINE 📱</button>
    </div>

    <div id="app-wrapper">
        <div class="left-panel">
            <header class="top-app-bar">
                <div class="app-bar-brand">SyncMusic</div>
                <div class="app-bar-status">
                    <span id="status" class="status-text" style="color: yellow;">Connecting...</span>
                    <span id="rttIndicator" class="rtt-indicator" style="display:none;">
                        <span id="rttDot" class="rtt-dot"></span>
                        <span id="rttValue" class="rtt-value"></span>
                    </span>
                </div>
            </header>

            <div class="player-container" id="playerContainer">
                <!-- Mobile pull indicator / collapse button -->
                <button id="playerToggleBtn" class="player-toggle-btn">
                    <svg viewBox="0 0 24 24">
                        <path d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z" />
                    </svg>
                </button>

                <!-- Clickable zone for mobile mini-player expansion -->
                <div class="mini-player-click-zone" id="miniPlayerClickZone">
                    <div class="cover-art" id="coverArt">🎵</div>

                    <div class="track-info">
                        <h2 class="track-title" id="trackTitle">Select a track</h2>
                        <p class="track-artist" id="trackArtist">Unknown Artist</p>
                    </div>

                    <!-- Mobile mini-player quick controls (play/pause, next) -->
                    <div class="mini-controls" id="miniControls">
                        <button id="miniShuffleBtn" class="ctrl-btn mini-btn" title="Shuffle">
                            <svg viewBox="0 0 24 24">
                                <path
                                    d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z" />
                            </svg>
                        </button>
                        <button id="miniPrevBtn" class="ctrl-btn mini-btn" title="Previous">
                            <svg viewBox="0 0 24 24">
                                <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z" />
                            </svg>
                        </button>
                        <button id="miniPlayPauseBtn" class="ctrl-btn mini-btn play-pause-mini-btn" title="Play/Pause">
                            <svg viewBox="0 0 24 24">
                                <path d="M8 5v14l11-7z" />
                            </svg>
                        </button>
                        <button id="miniNextBtn" class="ctrl-btn mini-btn" title="Next">
                            <svg viewBox="0 0 24 24">
                                <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z" />
                            </svg>
                        </button>
                        <button id="miniRepeatBtn" class="ctrl-btn mini-btn" title="Repeat">
                            <svg viewBox="0 0 24 24">
                                <path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z" />
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="progress-container">
                    <input type="range" id="progressBar" min="0" max="100" value="0" step="0.1">
                    <div class="time-display">
                        <span id="currentTimeDisp">0:00</span>
                        <span id="durationDisp">0:00</span>
                    </div>
                </div>

                <div class="controls">
                    <button id="shuffleBtn" class="ctrl-btn" title="Shuffle">
                        <svg viewBox="0 0 24 24">
                            <path
                                d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z" />
                        </svg>
                    </button>
                    <button id="prevBtn" class="ctrl-btn" title="Previous">
                        <svg viewBox="0 0 24 24">
                            <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z" />
                        </svg>
                    </button>
                    <button id="playPauseBtn" class="ctrl-btn play-pause-btn" title="Play/Pause">
                        <svg id="icon-play" viewBox="0 0 24 24">
                            <path d="M8 5v14l11-7z" />
                        </svg>
                    </button>
                    <button id="nextBtn" class="ctrl-btn" title="Next">
                        <svg viewBox="0 0 24 24">
                            <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z" />
                        </svg>
                    </button>
                    <button id="repeatBtn" class="ctrl-btn" title="Repeat">
                        <svg viewBox="0 0 24 24">
                            <path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z" />
                        </svg>
                    </button>
                </div>

                <div class="volume-container" id="volumeContainer">
                    <svg id="volumeIcon" viewBox="0 0 24 24" class="volume-icon">
                        <path
                            d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" />
                    </svg>
                    <input type="range" id="volumeSlider" min="0" max="1" value="1" step="0.01">
                </div>

                <audio id="audioPlayer"></audio>
            </div>
        </div> <!-- End left-panel -->

        <div class="right-panel">
            <div class="playlist-section">
                <div id="libraryView">
                    <div id="loadingIndicator" class="loading-indicator">
                        <div class="spinner"></div>
                        <span>Loading library...</span>
                    </div>

                    <!-- Search bar (shown after library loads) -->
                    <div id="searchContainer" class="search-container" style="display:none;">
                        <div class="search-wrap">
                            <svg class="search-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                            <input type="search" id="searchInput" class="search-input" placeholder="Search tracks &amp; artists..." autocomplete="off">
                        </div>
                    </div>
                    <!-- Search results (flat list shown while query is active) -->
                    <div id="searchResults" style="display:none;"></div>

                    <button id="backBtn" class="item-btn">⬅ Back to folders</button>
                    <div id="foldersContainer" style="display: none;"></div>
                    <div id="songsContainer" style="display: none;"></div>

                    <!-- Locator FAB -->
                    <button id="locateTrackBtn" class="locate-fab" title="Locate Playing Track">
                        <svg viewBox="0 0 24 24">
                            <path
                                d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z" />
                        </svg>
                    </button>
                </div>

                <div id="queueView" style="display: none;">
                    <div id="queueContainer" class="queue-list">
                        <div class="empty-queue-msg">Queue is empty.</div>
                    </div>
                </div>

                <!-- Presence List -->
                <div class="presence-container">
                    <h4>👥 Listeners</h4>
                    <div id="usersList" class="users-list">
                        <!-- Populated dynamically via main.js -->
                    </div>
                </div>
            </div>
        </div> <!-- End right-panel -->
    </div> <!-- End app-wrapper -->

    <div id="settingsOverlay" style="display: none;" class="modal-overlay">
        <div class="modal-content">
            <h2 style="color: white; margin-bottom: 20px; font-weight: 700;">Settings ⚙️</h2>
            
            <div id="settingsActionContainer" style="display:flex; flex-direction:column; gap:10px;">
                <!-- Cache / Rescan buttons dynamically relocated here by library.js -->
            </div>

            <button id="closeSettingsBtn" class="item-btn" style="margin-top: 25px; justify-content: center; background: rgba(255,255,255,0.1);">Close</button>
        </div>
    </div>

    <script type="module" src="/src/js/main.js"></script>
</body>

</html>
