<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyncMusic</title>
    <style>
        /* GŁÓWNY MOTYW */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; margin: 0; padding: 20px; 
            background: linear-gradient(135deg, #1e1e1e 0%, #121212 100%); 
            color: white; min-height: 100vh; 
            -webkit-tap-highlight-color: transparent; /* Usuwa brzydki błysk na mobilkach! */
        }
        h1 { margin-bottom: 5px; color: #1DB954; font-size: 28px; letter-spacing: 1px;}
        p { margin-top: 0; font-size: 14px; color: #888; }
        
        /* GŁÓWNY KONTENER ODTWARZACZA */
        .player-container { 
            background: #181818; padding: 30px 20px; border-radius: 20px; 
            max-width: 380px; margin: 0 auto 30px auto; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.6); 
            display: flex; flex-direction: column; align-items: center;
        }

        .cover-art {
            width: 250px; height: 250px; border-radius: 15px; 
            background: linear-gradient(45deg, #2a2a2a, #3a3a3a);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: flex; justify-content: center; align-items: center;
            font-size: 80px; margin-bottom: 25px;
        }

        .track-info { width: 100%; text-align: left; margin-bottom: 20px; padding: 0 15px; box-sizing: border-box;}
        .track-title { font-size: 22px; font-weight: bold; color: #fff; margin: 0 0 5px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-artist { font-size: 15px; color: #b3b3b3; margin: 0; }

        /* PASEK POSTĘPU - Grubszy dla palców! */
        .progress-container { width: 100%; padding: 0 15px; box-sizing: border-box; margin-bottom: 25px; }
        .time-display { display: flex; justify-content: space-between; font-size: 12px; color: #a0a0a0; margin-top: 8px; font-weight: 500;}
        
        input[type="range"] {
            -webkit-appearance: none; appearance: none; width: 100%; height: 8px; background: #4d4d4d; 
            border-radius: 5px; outline: none; cursor: pointer;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none; width: 18px; height: 18px; 
            border-radius: 50%; background: #1DB954; cursor: pointer;
            transition: transform 0.1s; box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.3); }

        /* KONTROLKI ODTWARZANIA - Zoptymalizowane pod dotyk */
        .controls { 
            display: flex; justify-content: space-evenly; align-items: center; 
            width: 100%; padding: 0 10px;
        }
        
        .ctrl-btn { 
            background: transparent; color: #b3b3b3; border: none; 
            cursor: pointer; display: flex; justify-content: center; align-items: center; 
            padding: 15px; /* Ogromny touch-target! */
            border-radius: 50%; transition: all 0.2s;
            touch-action: manipulation; /* Brak opóźnienia 300ms na klik! */
        }
        .ctrl-btn svg { width: 28px; height: 28px; fill: currentColor; }
        
        .ctrl-btn:hover { color: #fff; transform: scale(1.1); }
        .ctrl-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.1); }
        
        /* Wielki przycisk Play/Pause */
        .play-pause-btn { 
            background: #fff; color: #000; width: 70px; height: 70px; 
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
        }
        .play-pause-btn svg { width: 36px; height: 36px; }
        .play-pause-btn:hover { background: #1DB954; color: #fff; transform: scale(1.05); }
        .play-pause-btn:active { transform: scale(0.95); }

        #shuffleBtn.active { color: #1DB954; }

        audio { display: none; }

        /* BIBLIOTEKA */
        .playlist-section { background: #181818; padding: 20px; border-radius: 15px; max-width: 380px; margin: 0 auto; }
        .playlist-section h3 { margin-top: 0; text-align: left; padding-left: 10px; color: #ddd;}
        button.item-btn { 
            width: 100%; text-align: left; padding: 18px 15px; /* Wyższe przyciski listy */
            background: #222; color: #ddd; border: none; border-radius: 8px; 
            margin-bottom: 8px; font-size: 15px; cursor: pointer; transition: 0.2s; 
            touch-action: manipulation;
        }
        button.item-btn:hover { background: #333; }
        button.item-btn:active { transform: scale(0.98); }
        
        .folder-btn { border-left: 5px solid #1DB954; font-weight: bold; }
        #backBtn { background-color: #333; color: white; display: none; margin-bottom: 15px; font-weight: bold; text-align: center; }
        #backBtn:hover { background-color: #444; }

        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95); z-index: 1000; flex-direction: column; justify-content: center; align-items: center; }
        #joinBtn { background-color: #1DB954; color: white; font-size: 20px; padding: 15px 35px; border-radius: 50px; font-weight: bold; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div id="overlay">
        <h2 style="color: white; margin-bottom: 30px;">Dołącz do synchronizacji</h2>
        <button id="joinBtn">DOŁĄCZ DO ODSŁUCHU 🎧</button>
    </div>

    <h1>SyncMusic</h1>
    <p>Status: <span id="status" style="color: yellow;">Łączenie...</span></p>

    <div class="player-container">
        <div class="cover-art" id="coverArt">🎵</div>
        
        <div class="track-info">
            <h2 class="track-title" id="trackTitle">Wybierz utwór</h2>
            <p class="track-artist" id="trackArtist">Nieznany wykonawca</p>
        </div>

        <div class="progress-container">
            <input type="range" id="progressBar" min="0" max="100" value="0" step="0.1">
            <div class="time-display">
                <span id="currentTimeDisp">0:00</span>
                <span id="durationDisp">0:00</span>
            </div>
        </div>
        
        <div class="controls">
            <button id="shuffleBtn" class="ctrl-btn" title="Losowanie">
                <svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
            </button>
            <button id="prevBtn" class="ctrl-btn" title="Poprzedni">
                <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
            </button>
            <button id="playPauseBtn" class="ctrl-btn play-pause-btn" title="Graj/Pauza">
                <svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            </button>
            <button id="nextBtn" class="ctrl-btn" title="Następny">
                <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
            </button>
        </div>

        <audio id="audioPlayer"></audio>
    </div>
    
    <div class="playlist-section">
        <h3>Biblioteka</h3>
        <button id="backBtn" class="item-btn">⬅ Wróć do folderów</button>
        <div id="foldersContainer"></div>
        <div id="songsContainer" style="display: none;"></div>
    </div>

<script>
        const audio = document.getElementById("audioPlayer");
        const statusText = document.getElementById("status");
        const trackTitle = document.getElementById("trackTitle");
        const playPauseBtn = document.getElementById("playPauseBtn");
        const progressBar = document.getElementById("progressBar");
        const currentTimeDisp = document.getElementById("currentTimeDisp");
        const durationDisp = document.getElementById("durationDisp");
        const coverArt = document.getElementById("coverArt"); // NOWE
        const shuffleBtn = document.getElementById("shuffleBtn");
        
        const foldersContainer = document.getElementById("foldersContainer");
        const songsContainer = document.getElementById("songsContainer");
        const backBtn = document.getElementById("backBtn");
        const overlay = document.getElementById("overlay");
        
        const socket = new WebSocket("ws://" + window.location.host + "/ws");
        
        let ignoreEvents = false; 
        let pendingPlay = false; 
        let syncReceivedTime = 0; 
        let syncAudioTime = 0;    
        let shouldBePlaying = false; 
        
        let currentPlaylist = [];
        let currentSongPath = "";
        let isShuffle = false; 
        let lastKnownTime = -1; 
        let isDraggingProgress = false; 

        const svgPlay = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
        const svgPause = '<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>';

        const formatTime = (seconds) => {
            if (isNaN(seconds) || seconds < 0) return "0:00";
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        };

        socket.onopen = () => {
            statusText.innerText = "Podłączono! 🟢";
            statusText.style.color = "#1DB954";
        };

        const sendSync = (data) => {
            if (!ignoreEvents) socket.send(JSON.stringify(data));
        };

        // --- AKTUALIZACJA UI (Z OKŁADKĄ!) ---
        const updateNowPlaying = (path) => {
            if (!path) return;
            const parts = path.split('/');
            let filename = parts[parts.length - 1].replace(/\.[^/.]+$/, ""); 
            trackTitle.innerText = filename;
            
            // Pytamy nasz nowy backend o obrazek
            const coverUrl = `/api/cover?song=${encodeURIComponent(path)}`;
            
            // Sztuczka: ładujemy obrazek w tle, jeśli się uda - podmieniamy, jak nie to nutka
            const img = new Image();
            img.onload = () => {
                coverArt.style.backgroundImage = `url('${coverUrl}')`;
                coverArt.style.backgroundSize = "cover";
                coverArt.style.backgroundPosition = "center";
                coverArt.innerHTML = ""; // Ukrywamy nutkę
            };
            img.onerror = () => {
                // Brak okładki w pliku mp3 - wracamy do domyślnej grafiki
                coverArt.style.backgroundImage = "linear-gradient(45deg, #2a2a2a, #3a3a3a)";
                coverArt.innerHTML = "🎵";
            };
            img.src = coverUrl; // To wyzwala pobieranie
        };

        // --- GLOBALNY SHUFFLE ---
        const updateShuffleUI = (state) => {
            isShuffle = state;
            shuffleBtn.classList.toggle("active", isShuffle);
        };

        shuffleBtn.onclick = () => {
            if (navigator.vibrate) navigator.vibrate(30);
            const newState = !isShuffle;
            updateShuffleUI(newState);
            // Wysyłamy informację do wszystkich!
            socket.send(JSON.stringify({ action: "shuffle", state: newState }));
        };

        // --- LIVENESS PROBE ---
        setInterval(() => {
            if (!shouldBePlaying) return;
            const isActuallyMoving = audio.currentTime > lastKnownTime;
            lastKnownTime = audio.currentTime;
            if (audio.paused || !isActuallyMoving) {
                audio.play().catch(() => {
                    if (!pendingPlay) { pendingPlay = true; overlay.style.display = "flex"; }
                });
            }
        }, 800);

        audio.addEventListener('timeupdate', () => {
            if (!isDraggingProgress) {
                progressBar.value = audio.currentTime;
            }
            currentTimeDisp.innerText = formatTime(audio.currentTime);
            if (audio.duration) {
                progressBar.max = audio.duration;
                durationDisp.innerText = formatTime(audio.duration);
            }
        });

        audio.addEventListener('loadedmetadata', () => {
            progressBar.max = audio.duration;
            durationDisp.innerText = formatTime(audio.duration);
        });

        playPauseBtn.onclick = () => {
            if (navigator.vibrate) navigator.vibrate(50);
            if (audio.paused) audio.play(); else audio.pause(); 
        };

        progressBar.addEventListener('input', () => {
            isDraggingProgress = true;
            currentTimeDisp.innerText = formatTime(progressBar.value);
        });

        progressBar.addEventListener('change', () => {
            isDraggingProgress = false;
            audio.currentTime = progressBar.value;
            if (!ignoreEvents) {
                sendSync({ action: "seek", time: parseFloat(progressBar.value), isPlaying: shouldBePlaying });
            }
        });

        audio.onplay = () => {
            playPauseBtn.innerHTML = svgPause; 
            if (ignoreEvents) return;
            shouldBePlaying = true;
            sendSync({ action: "play", time: audio.currentTime });
        };

        audio.onpause = () => {
            playPauseBtn.innerHTML = svgPlay; 
            if (ignoreEvents || audio.readyState < 2) return; 
            shouldBePlaying = false;
            sendSync({ action: "pause", time: audio.currentTime });
        };

        const playNext = () => {
            if (navigator.vibrate) navigator.vibrate(30);
            if (currentPlaylist.length === 0) return;
            let nextIndex = 0;
            if (isShuffle) {
                nextIndex = Math.floor(Math.random() * currentPlaylist.length);
            } else {
                const currentIndex = currentPlaylist.findIndex(s => s.path === currentSongPath);
                nextIndex = currentIndex + 1;
                if (nextIndex >= currentPlaylist.length) nextIndex = 0; 
            }
            socket.send(JSON.stringify({ action: "load", song: currentPlaylist[nextIndex].path }));
        };

        const playPrev = () => {
            if (navigator.vibrate) navigator.vibrate(30);
            if (currentPlaylist.length === 0) return;
            const currentIndex = currentPlaylist.findIndex(s => s.path === currentSongPath);
            let prevIndex = currentIndex - 1;
            if (prevIndex < 0) prevIndex = currentPlaylist.length - 1;
            socket.send(JSON.stringify({ action: "load", song: currentPlaylist[prevIndex].path }));
        };

        document.getElementById("nextBtn").onclick = playNext;
        document.getElementById("prevBtn").onclick = playPrev;

        audio.onended = () => { if (!ignoreEvents) playNext(); };

        document.getElementById("joinBtn").onclick = () => {
            overlay.style.display = "none"; 
            pendingPlay = false;
            const waitTimeSeconds = (Date.now() - syncReceivedTime) / 1000;
            audio.currentTime = syncAudioTime + waitTimeSeconds;
            shouldBePlaying = true;
            audio.play();
        };

        fetch('/api/songs').then(r => r.json()).then(songs => {
            if(!songs || songs.length === 0) return;
            const groups = {};
            songs.forEach(path => {
                const parts = path.split('/');
                const folder = parts.length > 1 ? parts[0] : "Luzem";
                if (!groups[folder]) groups[folder] = [];
                groups[folder].push({ path, name: parts.length > 1 ? parts.slice(1).join('/') : path });
            });

            const showFolders = () => {
                foldersContainer.style.display = "block"; songsContainer.style.display = "none";
                backBtn.style.display = "none"; foldersContainer.innerHTML = "";
                for (const f in groups) {
                    const b = document.createElement("button");
                    b.className = "item-btn folder-btn";
                    b.innerText = `📁 ${f} (${groups[f].length})`;
                    b.onclick = () => {
                        foldersContainer.style.display = "none"; songsContainer.style.display = "block";
                        backBtn.style.display = "block"; songsContainer.innerHTML = "";
                        
                        currentPlaylist = groups[f];
                        
                        groups[f].forEach(s => {
                            const sb = document.createElement("button");
                            sb.className = "item-btn"; 
                            sb.innerText = "🎵 " + s.name.replace(/\.[^/.]+$/, ""); 
                            sb.onclick = () => socket.send(JSON.stringify({ action: "load", song: s.path }));
                            songsContainer.appendChild(sb);
                        });
                    };
                    foldersContainer.appendChild(b);
                }
            };
            showFolders();
            backBtn.onclick = showFolders;
        });

        // --- ODBIERANIE ROZKAZÓW Z SERWERA ---
        socket.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            ignoreEvents = true;

            if (msg.action === "sync") {
                audio.src = "/music/" + msg.song;
                currentSongPath = msg.song;
                updateNowPlaying(currentSongPath);
                
                audio.currentTime = msg.time;
                syncReceivedTime = Date.now();
                syncAudioTime = msg.time;
                shouldBePlaying = msg.isPlaying;
                
                // Odbieramy stan shuffle!
                if (msg.isShuffle !== undefined) updateShuffleUI(msg.isShuffle);
                
            } else if (msg.action === "load") {
                audio.src = "/music/" + msg.song;
                currentSongPath = msg.song;
                updateNowPlaying(currentSongPath);
                shouldBePlaying = true;
            } else if (msg.action === "play") {
                audio.currentTime = msg.time;
                shouldBePlaying = true;
            } else if (msg.action === "pause") {
                shouldBePlaying = false;
                audio.pause();
                audio.currentTime = msg.time;
            } else if (msg.action === "seek") {
                audio.currentTime = msg.time;
                shouldBePlaying = msg.isPlaying;
                lastKnownTime = -1; 
            } else if (msg.action === "shuffle") {
                // Ktoś inny kliknął przycisk shuffle!
                updateShuffleUI(msg.state);
            }

            setTimeout(() => { ignoreEvents = false; }, 800);
        };
    </script>
</body>
</html>
