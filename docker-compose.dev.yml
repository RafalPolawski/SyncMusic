# SyncMusic — Development Compose
# Builds images locally, mounts source code for hot reload.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up --build
#
# Set MUSIC_DIR to your local music path (defaults to /Muzyka for backwards compat).

services:
  syncmusic-backend:
    container_name: syncmusic-backend
    build:
      context: ./backend
    restart: unless-stopped
    expose:
      - "8080"
    ports:
      - "4433:4433/udp"
    volumes:
      - "${MUSIC_DIR:-/c/Muzyka}:/app/music:ro"
    environment:
      - REDIS_URL=redis://syncmusic-redis-dev:6379/0
    depends_on:
      - syncmusic-redis-dev

  syncmusic-redis-dev:
    image: redis:8-alpine
    container_name: syncmusic-redis-dev
    restart: unless-stopped
    volumes:
      - syncmusic_redis_dev:/data

  syncmusic-frontend:
    container_name: syncmusic-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    expose:
      - "5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - syncmusic-backend

  syncmusic-proxy:
    container_name: syncmusic-proxy
    build:
      context: ./caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile.dev:/etc/caddy/Caddyfile:ro
      - caddy_data_dev:/data
      - caddy_config_dev:/config
    depends_on:
      - syncmusic-backend
      - syncmusic-frontend

  syncmusic-postgres:
    image: postgres:18-alpine
    container_name: syncmusic-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: password
      POSTGRES_DB: keycloak
    volumes:
      - syncmusic_postgres_data:/var/lib/postgresql/data

  syncmusic-keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: syncmusic-keycloak
    restart: unless-stopped
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://syncmusic-postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: password
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    command: start-dev
    ports:
      - "8082:8080"
    depends_on:
      - syncmusic-postgres

volumes:
  caddy_data_dev:
  caddy_config_dev:
  syncmusic_db_dev:
  syncmusic_redis_dev:
  frontend_node_modules:
  syncmusic_postgres_data:
