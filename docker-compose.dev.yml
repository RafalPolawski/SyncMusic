# SyncMusic — Development Compose
# Builds images locally, mounts source code for hot reload.

services:
  syncmusic-backend:
    container_name: syncmusic-backend
    build:
      context: ./backend
    restart: unless-stopped
    expose:
      - "8080"
    ports:
      - "4433:4433/udp"
    volumes:
      - "${MUSIC_DIR:-/c/Muzyka}:/app/music:ro"
    environment:
      - REDIS_URL=redis://syncmusic-redis:6379/0
      - DATABASE_URL=postgres://keycloak:password@syncmusic-postgres:5432/keycloak?sslmode=disable
    depends_on:
      - syncmusic-redis
      - syncmusic-postgres

  syncmusic-redis:
    image: redis:8-alpine
    container_name: syncmusic-redis
    restart: unless-stopped
    volumes:
      - syncmusic_redis:/data

  syncmusic-frontend:
    container_name: syncmusic-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    expose:
      - "5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

  syncmusic-proxy:
    image: caddy:2.9-alpine
    container_name: syncmusic-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      - DOMAIN=localhost
      - FRONTEND_DEV=true
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data_dev:/data
      - caddy_config_dev:/config
    depends_on:
      - syncmusic-backend
      - syncmusic-frontend

  syncmusic-postgres:
    image: postgres:18-alpine
    container_name: syncmusic-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: password
      POSTGRES_DB: keycloak
    volumes:
      - syncmusic_postgres_data:/var/lib/postgresql/data

  syncmusic-keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: syncmusic-keycloak
    restart: unless-stopped
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://syncmusic-postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: password
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_RELATIVE_PATH: /auth
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: xforwarded
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY: edge
    command: start-dev
    depends_on:
      - syncmusic-postgres
      - syncmusic-redis

volumes:
  caddy_data_dev:
  caddy_config_dev:
  syncmusic_redis:
  frontend_node_modules:
  syncmusic_postgres_data:
