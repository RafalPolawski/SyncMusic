# SyncMusic — Developer Overrides
# This file is loaded AUTOMATICALLY by Docker Compose for local development.
#   Usage: docker compose up --build

services:
  syncmusic-backend:
    build:
      context: ./backend
    volumes:
      - "${MUSIC_DIR:-./music}:/app/music:ro"
    # Local dev needs access to redis data on disk (optional)
    # - syncmusic_redis:/data

  syncmusic-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development # Use Vite dev server stage
    restart: unless-stopped
    expose:
      - "5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

  syncmusic-proxy:
    environment:
      - FRONTEND_DEV=true # Proxy to Vite dev server
    volumes:
      - frontend_dist:/usr/share/caddy # Shared with production build if needed
    depends_on:
      - syncmusic-frontend

  syncmusic-keycloak:
    command: start-dev # Simplified auth for local dev

volumes:
  frontend_node_modules:
